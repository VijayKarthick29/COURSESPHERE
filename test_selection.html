<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neural Gateway | System Access</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --e: #00f3ff; --m: #00ff41; --c: #ff00ff; 
            --a: #ffea00; --s: #2b5cff; --l: #ff3131;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #020202; color: white; font-family: 'Orbitron', sans-serif;
            min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center;
            overflow: hidden; position: relative;
        }

        /* DIGITAL GRID BACKGROUND - Fills the emptiness */
        body::before {
            content: ""; position: absolute; width: 200%; height: 200%;
            background-image: linear-gradient(rgba(0, 243, 255, 0.05) 1px, transparent 1px), 
                              linear-gradient(90deg, rgba(0, 243, 255, 0.05) 1px, transparent 1px);
            background-size: 50px 50px; background-position: center;
            z-index: -1; animation: drift 60s linear infinite;
        }

        /* CORNER BRACKETS - Makes the page feel like a HUD */
        body::after {
            content: ""; position: absolute; top: 20px; left: 20px; right: 20px; bottom: 20px;
            border: 1px solid rgba(255,255,255,0.05); pointer-events: none;
            clip-path: polygon(0 0, 10% 0, 10% 2px, 2px 2px, 2px 10%, 0 10%, 
                               90% 0, 100% 0, 100% 10%, 98% 10%, 98% 2px, 90% 2px,
                               100% 90%, 100% 100%, 90% 100%, 90% 98%, 98% 98%, 98% 90%,
                               10% 100%, 0 100%, 0 90%, 2px 90%, 2px 98%, 10% 98%);
        }

        @keyframes drift { from { transform: translate(-25%, -25%); } to { transform: translate(0, 0); } }

        /* INTENSE GLOWING HEADING */
        header { margin-bottom: 60px; text-align: center; }
        header h1 { 
            font-size: 18px; letter-spacing: 15px; color: #fff;
            text-shadow: 0 0 10px #fff, 0 0 20px var(--e), 0 0 40px var(--e);
            text-transform: uppercase; border-bottom: 1px solid rgba(0, 243, 255, 0.3);
            padding-bottom: 10px;
        }

        .hub-grid {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 40px;
            width: 85%; max-width: 700px;
        }

        .node {
            display: flex; flex-direction: column; align-items: center; text-decoration: none;
            transition: 0.3s transform;
        }
        .node:hover { transform: scale(1.1); }

        /* PERSISTENT NEON RINGS */
        .ring {
            width: 85px; height: 85px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            background: rgba(0,0,0,0.5); position: relative;
            border: 2px solid; transition: 0.4s;
        }

        .letter { font-size: 28px; font-weight: 900; transition: 0.4s; }
        .label { font-size: 9px; letter-spacing: 3px; margin-top: 15px; text-transform: uppercase; font-weight: bold; }

        /* CONSTANT STREAM COLORS */
        .node-e .ring { border-color: var(--e); box-shadow: 0 0 15px var(--e), inset 0 0 10px var(--e); }
        .node-e .letter { color: var(--e); text-shadow: 0 0 10px var(--e); }
        .node-e .label { color: var(--e); text-shadow: 0 0 5px var(--e); }

        .node-m .ring { border-color: var(--m); box-shadow: 0 0 15px var(--m), inset 0 0 10px var(--m); }
        .node-m .letter { color: var(--m); text-shadow: 0 0 10px var(--m); }
        .node-m .label { color: var(--m); text-shadow: 0 0 5px var(--m); }

        .node-c .ring { border-color: var(--c); box-shadow: 0 0 15px var(--c), inset 0 0 10px var(--c); }
        .node-c .letter { color: var(--c); text-shadow: 0 0 10px var(--c); }
        .node-c .label { color: var(--c); text-shadow: 0 0 5px var(--c); }

        .node-a .ring { border-color: var(--a); box-shadow: 0 0 15px var(--a), inset 0 0 10px var(--a); }
        .node-a .letter { color: var(--a); text-shadow: 0 0 10px var(--a); }
        .node-a .label { color: var(--a); text-shadow: 0 0 5px var(--a); }

        .node-s .ring { border-color: var(--s); box-shadow: 0 0 15px var(--s), inset 0 0 10px var(--s); }
        .node-s .letter { color: var(--s); text-shadow: 0 0 10px var(--s); }
        .node-s .label { color: var(--s); text-shadow: 0 0 5px var(--s); }

        .node-l .ring { border-color: var(--l); box-shadow: 0 0 15px var(--l), inset 0 0 10px var(--l); }
        .node-l .letter { color: var(--l); text-shadow: 0 0 10px var(--l); }
        .node-l .label { color: var(--l); text-shadow: 0 0 5px var(--l); }

        @media (max-width: 500px) {
            .hub-grid { grid-template-columns: repeat(2, 1fr); }
            header h1 { font-size: 14px; letter-spacing: 5px; }
        }
    </style>
</head>
<body>
    <div class="bg-layer"></div>

    <header>
        <h1>TESTS HUB</h1>
    </header>

    <div class="hub-grid">
        <a href="test_engineering.html" class="node node-e">
            <div class="ring"><div class="letter">E</div></div>
            <div class="label">Engineering</div>
        </a>
        <a href="test_medical.html" class="node node-m">
            <div class="ring"><div class="letter">M</div></div>
            <div class="label">Medical</div>
        </a>
        <a href="test_commerce.html" class="node node-c">
            <div class="ring"><div class="letter">C</div></div>
            <div class="label">Commerce</div>
        </a>
        <a href="test_arts.html" class="node node-a">
            <div class="ring"><div class="letter">A</div></div>
            <div class="label">Arts</div>
        </a>
        <a href="test_science.html" class="node node-s">
            <div class="ring"><div class="letter">S</div></div>
            <div class="label">Science</div>
        </a>
        <a href="test_law.html" class="node node-l">
            <div class="ring"><div class="letter">L</div></div>
            <div class="label">Law</div>
        </a>
    </div>
</body>
</html>
