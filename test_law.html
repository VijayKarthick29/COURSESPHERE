<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CourseSphere | Law Neural Link</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Exo+2:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #ff3131; --glass: rgba(255, 49, 49, 0.05); --border: rgba(255, 49, 49, 0.2); }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background: #020202; color: white; font-family: 'Exo 2', sans-serif; 
            min-height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }

        /* Tactical Scanline Overlay */
        body::before {
            content: " "; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 2px, 3px 100%; z-index: 100; pointer-events: none;
        }

        .bg-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: url('final.jpeg') center/cover no-repeat; z-index: -2; filter: brightness(0.08) blur(15px); }

        .top-bar { 
            display: flex; justify-content: space-between; padding: 15px 5%; 
            background: rgba(0,0,0,0.85); border-bottom: 1px solid var(--border);
            box-shadow: 0 0 20px rgba(255, 49, 49, 0.15);
        }
        .stream-id { font-family: 'Orbitron'; color: var(--neon); letter-spacing: 5px; font-size: 14px; text-shadow: 0 0 10px var(--neon); }
        #timer { font-family: 'Orbitron'; color: #fff; font-size: 18px; text-shadow: 0 0 10px #fff; }

        .main-container { display: flex; flex: 1; padding: 20px; gap: 20px; max-width: 1200px; margin: 0 auto; width: 100%; z-index: 10; }

        .question-card { 
            flex: 7; background: var(--glass); backdrop-filter: blur(25px); border-radius: 15px; 
            padding: 40px; border: 1px solid var(--border); display: flex; flex-direction: column;
            box-shadow: inset 0 0 30px rgba(255, 49, 49, 0.05);
        }
        #q-num { font-family: 'Orbitron'; color: var(--neon); font-size: 12px; margin-bottom: 10px; letter-spacing: 2px; }
        #q-text { font-size: 20px; margin-bottom: 30px; line-height: 1.5; font-weight: 300; }

        .options-grid { display: grid; gap: 12px; }
        .opt { 
            background: rgba(255, 255, 255, 0.02); border: 1px solid var(--border); 
            padding: 15px 20px; border-radius: 8px; color: white; cursor: pointer; 
            text-align: left; transition: 0.3s; font-family: 'Exo 2';
        }
        .opt:hover { background: rgba(255, 49, 49, 0.1); border-color: var(--neon); }
        .opt.selected { background: var(--neon); color: #fff; font-weight: bold; box-shadow: 0 0 20px var(--neon); }

        .nav-sidebar { flex: 3; background: var(--glass); border-radius: 15px; padding: 20px; border: 1px solid var(--border); }
        .palette-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }
        .dot { 
            aspect-ratio: 1; border: 1px solid var(--border); border-radius: 4px; 
            display: flex; align-items: center; justify-content: center; 
            cursor: pointer; font-family: 'Orbitron'; font-size: 10px; transition: 0.3s;
        }
        .dot.active { border-color: var(--neon); box-shadow: 0 0 10px var(--neon); color: var(--neon); }
        .dot.done { background: var(--neon); color: #fff; }

        .controls { display: flex; flex-wrap: wrap; gap: 10px; margin-top: auto; padding-top: 30px; }
        .btn { 
            flex: 1; min-width: 120px; padding: 12px; border-radius: 5px; cursor: pointer; font-family: 'Orbitron'; 
            font-size: 11px; transition: 0.3s; background: transparent; color: #fff; border: 1px solid var(--border);
        }
        .btn:hover { background: var(--glass); border-color: var(--neon); }
        .btn-skip { border-color: rgba(255,255,255,0.3); opacity: 0.7; }
        #submit-btn { background: var(--neon); color: #fff; border: none; font-weight: 900; }

        @media (max-width: 800px) { .main-container { flex-direction: column; } .nav-sidebar { order: -1; } }
    </style>
</head>
<body>
    <div class="bg-layer"></div>
    <div class="top-bar">
        <div class="stream-id">LAW_NEURAL_LINK_v1.0</div>
        <div id="timer">10:00</div>
    </div>

    <div class="main-container">
        <div class="question-card">
            <div id="q-num">DATA_NODE_01</div>
            <h2 id="q-text">Synchronizing legal protocols...</h2>
            <div class="options-grid" id="options"></div>
            <div class="controls">
                <button class="btn" onclick="changeQ(-1)">PREVIOUS</button>
                <button class="btn btn-skip" onclick="changeQ(1)">SKIP_NODE</button>
                <button class="btn" id="next-btn" onclick="changeQ(1)">NEXT_NODE</button>
                <button class="btn" id="submit-btn" style="display:none" onclick="finalize()">SUBMIT_EVIDENCE</button>
            </div>
        </div>

        <div class="nav-sidebar">
            <p style="font-family: 'Orbitron'; font-size: 10px; margin-bottom: 15px; opacity: 0.5;">PROTOCOL_MAP</p>
            <div class="palette-grid" id="palette"></div>
        </div>
    </div>

    <script>
        let currentIdx = 0;
        let timeLeft = 600;
        let userAnswers = new Array(15).fill(null);

        const questions = [
            { q: "What is the Constitution?", opts: ["A type of law book", "Supreme law of a country", "Court order", "Government policy"], correct: 1 },
            { q: "Who makes laws in a country?", opts: ["Judiciary", "Legislature", "Police", "Citizens"], correct: 1 },
            { q: "IPC stands for:", opts: ["Indian Police Code", "Indian Penal Code", "Internal Procedure Code", "Indian Public Code"], correct: 1 },
            { q: "What is a contract?", opts: ["Verbal promise only", "Legal agreement", "Personal decision", "Government rule"], correct: 1 },
            { q: "What is FIR?", opts: ["First Investigation Report", "First Information Report", "Final Investigation Record", "First Internal Record"], correct: 1 },
            { q: "Which branch of government interprets laws?", opts: ["Executive", "Legislature", "Judiciary", "Police"], correct: 2 },
            { q: "Right to Equality ensures:", opts: ["Freedom of speech", "Equal treatment before law", "Right to education", "Right to vote"], correct: 1 },
            { q: "What is evidence in law?", opts: ["Opinion", "Proof presented in court", "Lawyer’s statement", "Judge’s decision"], correct: 1 },
            { q: "Which court is the highest in India?", opts: ["High Court", "District Court", "Supreme Court", "Sessions Court"], correct: 2 },
            { q: "What is a civil case related to?", opts: ["Criminal offense", "Personal disputes", "Murder cases", "Theft cases"], correct: 1 },
            { q: "What is the principle of 'Rule of Law'?", opts: ["Law applies only to government", "Law applies equally to all", "Only courts follow law", "Only citizens follow law"], correct: 1 },
            { q: "Which Article of the Indian Constitution guarantees Right to Equality?", opts: ["Article 14", "Article 19", "Article 21", "Article 32"], correct: 0 },
            { q: "What is a writ?", opts: ["Written law", "Court order", "Police complaint", "Legal notice"], correct: 1 },
            { q: "Who is the guardian of the Constitution in India?", opts: ["President", "Parliament", "Supreme Court", "Prime Minister"], correct: 2 },
            { q: "What is 'habeas corpus'?", opts: ["Right to equality", "Produce the body before court", "Right to speech", "Legal agreement"], correct: 1 }
        ];

        function displayQuestion() {
            const q = questions[currentIdx];
            document.getElementById('q-num').innerText = `DATA_NODE_${String(currentIdx + 1).padStart(2, '0')}`;
            document.getElementById('q-text').innerText = q.q;
            
            const optContainer = document.getElementById('options');
            optContainer.innerHTML = '';
            
            q.opts.forEach((text, i) => {
                const btn = document.createElement('button');
                btn.className = `opt ${userAnswers[currentIdx] === i ? 'selected' : ''}`;
                btn.innerText = text;
                btn.onclick = () => { userAnswers[currentIdx] = i; displayQuestion(); drawPalette(); };
                optContainer.appendChild(btn);
            });

            document.getElementById('next-btn').style.display = currentIdx === 14 ? 'none' : 'block';
            document.getElementById('submit-btn').style.display = currentIdx === 14 ? 'block' : 'none';
            drawPalette();
        }

        function drawPalette() {
            const p = document.getElementById('palette');
            p.innerHTML = '';
            for(let i=0; i<15; i++) {
                const dot = document.createElement('div');
                dot.className = `dot ${i === currentIdx ? 'active' : ''} ${userAnswers[i] !== null ? 'done' : ''}`;
                dot.innerText = i + 1;
                dot.onclick = () => { currentIdx = i; displayQuestion(); };
                p.appendChild(dot);
            }
        }

        function changeQ(step) {
            currentIdx += step;
            if (currentIdx < 0) currentIdx = 0;
            if (currentIdx > 14) currentIdx = 14;
            displayQuestion();
        }

        function startTimer() {
            const timerLabel = document.getElementById('timer');
            const interval = setInterval(() => {
                let mins = Math.floor(timeLeft / 60);
                let secs = timeLeft % 60;
                timerLabel.innerText = `${mins}:${secs < 10 ? '0' : ''}${secs}`;
                if (timeLeft <= 0) { clearInterval(interval); finalize(); }
                timeLeft--;
            }, 1000);
        }

        function finalize() {
            const results = {
                stream: "Law",
                answers: userAnswers,
                correctKeys: questions.map(q => q.correct)
            };
            localStorage.setItem('last_test_results', JSON.stringify(results));
            window.location.href = 'result_analytics.html';
        }

        window.onload = () => { displayQuestion(); startTimer(); };
    </script>
</body>
</html>
