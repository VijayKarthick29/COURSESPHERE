<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CourseSphere | Science Neural Link</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Exo+2:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #2b5cff; --glass: rgba(43, 92, 255, 0.05); --border: rgba(43, 92, 255, 0.2); }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background: #020202; color: white; font-family: 'Exo 2', sans-serif; 
            min-height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }

        /* Tech-Scanline Overlay */
        body::before {
            content: " "; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), linear-gradient(90deg, rgba(0, 0, 255, 0.03), rgba(0, 255, 0, 0.01), rgba(255, 0, 0, 0.03));
            background-size: 100% 2px, 3px 100%; z-index: 100; pointer-events: none;
        }

        .bg-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: url('final.jpeg') center/cover no-repeat; z-index: -2; filter: brightness(0.1) blur(15px); }

        .top-bar { 
            display: flex; justify-content: space-between; padding: 15px 5%; 
            background: rgba(0,0,0,0.8); border-bottom: 1px solid var(--border);
            box-shadow: 0 0 20px rgba(43, 92, 255, 0.1);
        }
        .stream-id { font-family: 'Orbitron'; color: var(--neon); letter-spacing: 5px; font-size: 14px; text-shadow: 0 0 10px var(--neon); }
        #timer { font-family: 'Orbitron'; color: #fff; font-size: 18px; text-shadow: 0 0 10px #fff; }

        .main-container { display: flex; flex: 1; padding: 20px; gap: 20px; max-width: 1200px; margin: 0 auto; width: 100%; z-index: 10; }

        .question-card { 
            flex: 7; background: var(--glass); backdrop-filter: blur(20px); border-radius: 15px; 
            padding: 40px; border: 1px solid var(--border); display: flex; flex-direction: column;
        }
        #q-num { font-family: 'Orbitron'; color: var(--neon); font-size: 12px; margin-bottom: 10px; }
        #q-text { font-size: 20px; margin-bottom: 30px; line-height: 1.5; font-weight: 300; }

        .options-grid { display: grid; gap: 12px; }
        .opt { 
            background: rgba(255, 255, 255, 0.02); border: 1px solid var(--border); 
            padding: 15px 20px; border-radius: 8px; color: white; cursor: pointer; 
            text-align: left; transition: 0.3s; font-family: 'Exo 2';
        }
        .opt:hover { background: rgba(43, 92, 255, 0.1); border-color: var(--neon); }
        .opt.selected { background: var(--neon); color: #fff; font-weight: bold; box-shadow: 0 0 20px var(--neon); }

        .nav-sidebar { flex: 3; background: var(--glass); border-radius: 15px; padding: 20px; border: 1px solid var(--border); }
        .palette-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }
        .dot { 
            aspect-ratio: 1; border: 1px solid var(--border); border-radius: 4px; 
            display: flex; align-items: center; justify-content: center; 
            cursor: pointer; font-family: 'Orbitron'; font-size: 10px; transition: 0.3s;
        }
        .dot.active { border-color: var(--neon); box-shadow: 0 0 10px var(--neon); color: var(--neon); }
        .dot.done { background: var(--neon); color: #fff; }

        .controls { display: flex; flex-wrap: wrap; gap: 10px; margin-top: auto; padding-top: 30px; }
        .btn { 
            flex: 1; min-width: 120px; padding: 12px; border-radius: 5px; cursor: pointer; font-family: 'Orbitron'; 
            font-size: 11px; transition: 0.3s; background: transparent; color: #fff; border: 1px solid var(--border);
        }
        .btn:hover { background: var(--glass); border-color: var(--neon); }
        .btn-skip { border-color: rgba(255,255,255,0.3); opacity: 0.7; }
        #submit-btn { background: var(--neon); color: #fff; border: none; font-weight: 900; }

        @media (max-width: 800px) { .main-container { flex-direction: column; } .nav-sidebar { order: -1; } }
    </style>
</head>
<body>
    <div class="bg-layer"></div>
    <div class="top-bar">
        <div class="stream-id">SCIENCE_NEURAL_LINK_v1.0</div>
        <div id="timer">10:00</div>
    </div>

    <div class="main-container">
        <div class="question-card">
            <div id="q-num">DATA_NODE_01</div>
            <h2 id="q-text">Synchronizing laboratory nodes...</h2>
            <div class="options-grid" id="options"></div>
            <div class="controls">
                <button class="btn" onclick="changeQ(-1)">PREVIOUS</button>
                <button class="btn btn-skip" onclick="changeQ(1)">SKIP_NODE</button>
                <button class="btn" id="next-btn" onclick="changeQ(1)">NEXT_NODE</button>
                <button class="btn" id="submit-btn" style="display:none" onclick="finalize()">FINALIZE_ASSESSMENT</button>
            </div>
        </div>

        <div class="nav-sidebar">
            <p style="font-family: 'Orbitron'; font-size: 10px; margin-bottom: 15px; opacity: 0.5;">NODE_MAP</p>
            <div class="palette-grid" id="palette"></div>
        </div>
    </div>

    <script>
        let currentIdx = 0;
        let timeLeft = 600;
        let userAnswers = new Array(15).fill(null);

        const questions = [
            { q: "What is the chemical formula of water?", opts: ["CO2", "H2O", "O2", "H2"], correct: 1 },
            { q: "What is the SI unit of mass?", opts: ["Gram", "Kilogram", "Pound", "Ton"], correct: 1 },
            { q: "Which gas is essential for breathing?", opts: ["Carbon dioxide", "Oxygen", "Nitrogen", "Hydrogen"], correct: 1 },
            { q: "What is the boiling point of water?", opts: ["0°C", "50°C", "100°C", "150°C"], correct: 2 },
            { q: "Which planet is known as the Red Planet?", opts: ["Earth", "Mars", "Venus", "Jupiter"], correct: 1 },
            { q: "What is the pH of a neutral solution?", opts: ["0", "7", "14", "1"], correct: 1 },
            { q: "What force pulls objects toward the Earth?", opts: ["Magnetic force", "Friction", "Gravity", "Nuclear force"], correct: 2 },
            { q: "Which part of the plant performs photosynthesis?", opts: ["Root", "Stem", "Leaf", "Flower"], correct: 2 },
            { q: "What is the SI unit of electric current?", opts: ["Volt", "Watt", "Ampere", "Ohm"], correct: 2 },
            { q: "What type of energy is stored in food?", opts: ["Mechanical energy", "Chemical energy", "Electrical energy", "Nuclear energy"], correct: 1 },
            { q: "Which particle has a negative charge?", opts: ["Proton", "Neutron", "Electron", "Nucleus"], correct: 2 },
            { q: "What is the speed of light?", opts: ["3 × 10^6 m/s", "3 × 10^8 m/s", "3 × 10^10 m/s", "3 × 10^5 m/s"], correct: 1 },
            { q: "Which law states that every action has an equal and opposite reaction?", opts: ["Newton’s First Law", "Newton’s Second Law", "Newton’s Third Law", "Law of Gravity"], correct: 2 },
            { q: "What is the unit of resistance?", opts: ["Volt", "Ampere", "Ohm", "Watt"], correct: 2 },
            { q: "Which organelle is known as the “powerhouse of the cell”?", opts: ["Nucleus", "Ribosome", "Mitochondria", "Cytoplasm"], correct: 2 }
        ];

        function displayQuestion() {
            const q = questions[currentIdx];
            document.getElementById('q-num').innerText = `DATA_NODE_${String(currentIdx + 1).padStart(2, '0')}`;
            document.getElementById('q-text').innerText = q.q;
            
            const optContainer = document.getElementById('options');
            optContainer.innerHTML = '';
            
            q.opts.forEach((text, i) => {
                const btn = document.createElement('button');
                btn.className = `opt ${userAnswers[currentIdx] === i ? 'selected' : ''}`;
                btn.innerText = text;
                btn.onclick = () => { userAnswers[currentIdx] = i; displayQuestion(); drawPalette(); };
                optContainer.appendChild(btn);
            });

            document.getElementById('next-btn').style.display = currentIdx === 14 ? 'none' : 'block';
            document.getElementById('submit-btn').style.display = currentIdx === 14 ? 'block' : 'none';
            drawPalette();
        }

        function drawPalette() {
            const p = document.getElementById('palette');
            p.innerHTML = '';
            for(let i=0; i<15; i++) {
                const dot = document.createElement('div');
                dot.className = `dot ${i === currentIdx ? 'active' : ''} ${userAnswers[i] !== null ? 'done' : ''}`;
                dot.innerText = i + 1;
                dot.onclick = () => { currentIdx = i; displayQuestion(); };
                p.appendChild(dot);
            }
        }

        function changeQ(step) {
            currentIdx += step;
            if (currentIdx < 0) currentIdx = 0;
            if (currentIdx > 14) currentIdx = 14;
            displayQuestion();
        }

        function startTimer() {
            const timerLabel = document.getElementById('timer');
            const interval = setInterval(() => {
                let mins = Math.floor(timeLeft / 60);
                let secs = timeLeft % 60;
                timerLabel.innerText = `${mins}:${secs < 10 ? '0' : ''}${secs}`;
                if (timeLeft <= 0) { clearInterval(interval); finalize(); }
                timeLeft--;
            }, 1000);
        }

        function finalize() {
            const results = {
                stream: "Science",
                answers: userAnswers,
                correctKeys: questions.map(q => q.correct)
            };
            localStorage.setItem('last_test_results', JSON.stringify(results));
            window.location.href = 'result_analytics.html';
        }

        window.onload = () => { displayQuestion(); startTimer(); };
    </script>
</body>
</html>
