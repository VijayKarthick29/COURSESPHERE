<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CourseSphere | Neural Assessment</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary-cyan: #00cfff; --glass: rgba(255, 255, 255, 0.05); --border: rgba(255, 255, 255, 0.1); }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background: #000; color: white; font-family: 'Exo 2', sans-serif;
            min-height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }

        .bg-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('final.jpeg') center/cover no-repeat; z-index: -2; filter: brightness(0.15) blur(15px);
        }

        .top-bar {
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px 5%; background: rgba(0,0,0,0.6); border-bottom: 1px solid var(--border);
        }
        #timer { font-family: 'Orbitron'; color: var(--primary-cyan); font-size: 20px; text-shadow: 0 0 10px var(--primary-cyan); }
        #stream-title { font-family: 'Orbitron'; font-size: 14px; letter-spacing: 2px; text-transform: uppercase; }

        .main-test-area {
            display: flex; flex: 1; width: 100%; max-width: 1400px; margin: 0 auto;
            padding: 20px; gap: 20px; overflow: hidden;
        }

        .question-zone {
            flex: 7; background: var(--glass); backdrop-filter: blur(20px);
            border-radius: 20px; border: 1px solid var(--border);
            padding: clamp(20px, 5vw, 40px); display: flex; flex-direction: column;
        }
        #q-text { font-size: clamp(18px, 3vw, 22px); margin-bottom: 25px; line-height: 1.4; }
        .options-grid { display: grid; gap: 12px; flex: 1; }
        .option-btn {
            background: rgba(255,255,255,0.03); border: 1px solid var(--border);
            padding: 15px; border-radius: 12px; color: white; text-align: left;
            font-size: 15px; cursor: pointer; transition: 0.3s;
        }
        .option-btn:hover { background: rgba(0, 207, 255, 0.1); border-color: var(--primary-cyan); }
        .option-btn.selected { background: var(--primary-cyan); color: #000; font-weight: 900; }

        .nav-palette {
            flex: 3; background: var(--glass); backdrop-filter: blur(20px);
            border-radius: 20px; border: 1px solid var(--border); padding: 20px;
            display: flex; flex-direction: column; align-items: center;
        }
        .icon-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; width: 100%; }
        .q-icon {
            aspect-ratio: 1; border: 1px solid var(--border); border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            font-family: 'Orbitron'; font-size: 11px; cursor: pointer; transition: 0.3s;
        }
        .q-icon.current { border-color: var(--primary-cyan); box-shadow: 0 0 10px var(--primary-cyan); }
        .q-icon.answered { background: #00ff88; color: #000; border-color: #00ff88; }
        .q-icon.skipped { background: #ffcc00; color: #000; border-color: #ffcc00; }

        .controls { display: flex; justify-content: space-between; margin-top: 25px; gap: 10px; }
        .control-btn {
            flex: 1; padding: 12px; font-family: 'Orbitron'; font-size: 10px;
            background: none; border: 1px solid var(--primary-cyan); color: var(--primary-cyan);
            border-radius: 50px; cursor: pointer; text-transform: uppercase; transition: 0.3s;
        }
        .control-btn:hover { background: rgba(0, 207, 255, 0.1); }
        #submit-btn { background: var(--primary-cyan); color: #000; font-weight: 900; }

        @media (max-width: 768px) {
            .main-test-area { flex-direction: column; overflow-y: auto; }
            .nav-palette { order: -1; flex: none; height: auto; padding: 15px; }
            .question-zone { flex: none; }
            .icon-grid { grid-template-columns: repeat(8, 1fr); }
        }
    </style>
</head>
<body>
    <div class="bg-layer"></div>

    <div class="top-bar">
        <div id="stream-title">SECURE_LINK: INITIALIZING...</div>
        <div id="timer">10:00</div>
    </div>

    <div class="main-test-area">
        <div class="question-zone">
            <h2 id="q-text">Loading Neural Patterns...</h2>
            <div class="options-grid" id="options-container"></div>
            
            <div class="controls">
                <button class="control-btn" onclick="prevQuestion()">Previous</button>
                <button class="control-btn" style="border-color: #ffcc00; color: #ffcc00;" onclick="skipQuestion()">Skip</button>
                <button class="control-btn" id="next-btn" onclick="nextQuestion()">Next</button>
                <button class="control-btn" id="submit-btn" style="display: none;" onclick="finishTest()">Submit</button>
            </div>
        </div>

        <div class="nav-palette">
            <h3 style="font-family: 'Orbitron'; font-size: 10px; margin-bottom: 15px; letter-spacing: 2px;">NEURAL_MAP</h3>
            <div class="icon-grid" id="palette-grid"></div>
        </div>
    </div>

    <script>
        let currentIdx = 0;
        let timeLeft = 600;
        let userAnswers = new Array(15).fill(null);
        let skippedQuestions = new Array(15).fill(false);
        
        const stream = localStorage.getItem('selected_stream') || 'General';
        document.getElementById('stream-title').innerText = stream.toUpperCase() + "_ASSESSMENT_UNIT";

        const questions = [
            { q: "What does CPU stand for?", opts: ["Central Process Unit", "Central Processing Unit", "Computer Personal Unit", "Control Processing Unit"], correct: 1 },
            { q: "What is the SI unit of force?", opts: ["Joule", "Pascal", "Newton", "Watt"], correct: 2 },
            { q: "What is 1 byte equal to?", opts: ["4 bits", "8 bits", "16 bits", "32 bits"], correct: 1 },
            { q: "Which material is the best electrical conductor?", opts: ["Copper", "Aluminum", "Silver", "Iron"], correct: 2 },
            { q: "What is the speed of light?", opts: ["3 × 10⁶ m/s", "3 × 10⁸ m/s", "3 × 10¹⁰ m/s", "3 × 10⁵ m/s"], correct: 1 },
            { q: "Ohm’s Law is represented as:", opts: ["V = IR", "P = VI", "I = V²/R", "R = VI"], correct: 0 },
            { q: "What is the time complexity of binary search?", opts: ["O(n)", "O(n²)", "O(log n)", "O(1)"], correct: 2 },
            { q: "Which device is used to convert AC to DC?", opts: ["Transformer", "Rectifier", "Capacitor", "Inductor"], correct: 1 },
            { q: "What is the SI unit of power?", opts: ["Joule", "Watt", "Volt", "Ampere"], correct: 1 },
            { q: "Which gate is known as a universal gate?", opts: ["AND", "OR", "NOT", "NAND"], correct: 3 },
            { q: "Which data structure uses LIFO (Last In First Out)?", opts: ["Queue", "Stack", "Tree", "Graph"], correct: 1 },
            { q: "What is the efficiency of an ideal transformer?", opts: ["50%", "75%", "90%", "100%"], correct: 3 },
            { q: "Which of the following is NOT a programming paradigm?", opts: ["Object-Oriented", "Functional", "Procedural", "Mechanical"], correct: 3 },
            { q: "In networking, what does IP stand for?", opts: ["Internet Protocol", "Internal Process", "Information Path", "Integrated Program"], correct: 0 },
            { q: "Which law states that current is directly proportional to voltage?", opts: ["Newton’s Law", "Ohm’s Law", "Kirchhoff’s Law", "Faraday’s Law"], correct: 1 }
        ];

        function initTest() {
            startTimer();
            renderPalette();
            loadQuestion();
        }

        function startTimer() {
            const timerDisplay = document.getElementById('timer');
            const countdown = setInterval(() => {
                let mins = Math.floor(timeLeft / 60);
                let secs = timeLeft % 60;
                timerDisplay.innerText = `${mins}:${secs < 10 ? '0' : ''}${secs}`;
                if (timeLeft <= 0) { clearInterval(countdown); finishTest(); }
                timeLeft--;
            }, 1000);
        }

        function renderPalette() {
            const grid = document.getElementById('palette-grid');
            grid.innerHTML = '';
            for (let i = 0; i < 15; i++) {
                const icon = document.createElement('div');
                icon.className = 'q-icon';
                icon.innerText = i + 1;
                icon.id = `icon-${i}`;
                icon.onclick = () => { currentIdx = i; loadQuestion(); };
                grid.appendChild(icon);
            }
        }

        function loadQuestion() {
            const q = questions[currentIdx];
            document.getElementById('q-text').innerText = `${currentIdx + 1}. ${q.q}`;
            const container = document.getElementById('options-container');
            container.innerHTML = '';
            
            q.opts.forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.className = `option-btn ${userAnswers[currentIdx] === i ? 'selected' : ''}`;
                btn.innerText = opt;
                btn.onclick = () => selectOption(i);
                container.appendChild(btn);
            });

            updatePaletteUI();
            document.getElementById('next-btn').style.display = currentIdx === 14 ? 'none' : 'block';
            document.getElementById('submit-btn').style.display = currentIdx === 14 ? 'block' : 'none';
        }

        function selectOption(idx) {
            userAnswers[currentIdx] = idx;
            skippedQuestions[currentIdx] = false;
            loadQuestion();
        }

        function skipQuestion() {
            skippedQuestions[currentIdx] = true;
            nextQuestion();
        }

        function nextQuestion() { if (currentIdx < 14) { currentIdx++; loadQuestion(); } }
        function prevQuestion() { if (currentIdx > 0) { currentIdx--; loadQuestion(); } }

        function updatePaletteUI() {
            for (let i = 0; i < 15; i++) {
                const icon = document.getElementById(`icon-${i}`);
                if(!icon) continue;
                icon.className = 'q-icon';
                if (i === currentIdx) icon.classList.add('current');
                if (userAnswers[i] !== null) icon.classList.add('answered');
                else if (skippedQuestions[i]) icon.classList.add('skipped');
            }
        }

        function finishTest() {
            const results = {
                answers: userAnswers,
                correctKeys: questions.map(q => q.correct),
                stream: stream,
                total: 15
            };
            localStorage.setItem('last_test_results', JSON.stringify(results));
            window.location.href = 'result_analytics.html';
        }

        window.onload = initTest;
    </script>
</body>
</html>
